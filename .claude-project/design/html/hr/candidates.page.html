<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Database · moved · STL ATS</title>
<meta http-equiv="refresh" content="0; url=results.page.html">
<link rel="canonical" href="results.page.html">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;margin:0;font-family:'Inter',system-ui,sans-serif;background:#F8FAFC;color:#0F172A}
  .wrap{height:100%;display:grid;place-items:center;text-align:center;padding:24px}
  .card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:28px 32px;max-width:520px;box-shadow:0 1px 2px rgba(15,23,42,.06)}
  h1{font-size:18px;margin:0 0 8px}
  p{color:#64748B;font-size:13.5px;line-height:1.6;margin:0 0 16px}
  a.btn{display:inline-flex;align-items:center;gap:8px;background:#0B61C2;color:#fff;text-decoration:none;
        font-weight:600;font-size:13px;padding:10px 16px;border-radius:8px}
  .logo{width:34px;height:34px;border-radius:9px;background:#0B61C2;color:#fff;display:grid;place-items:center;
        font-weight:700;margin:0 auto 14px}

/* ---- workflow spine v2 (stepper + numbered nav) ---- */
.wf-stepper{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:20px;overflow-x:auto;box-shadow:var(--shadow)}
.wf-step{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;font-weight:600;white-space:nowrap;text-decoration:none}
.wf-step .wf-dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--surface-2);color:var(--muted);font-size:12px;border:1px solid var(--border);flex:none}
.wf-step .wf-dot svg{width:14px;height:14px}
.wf-step.done{color:var(--text)}.wf-step.done .wf-dot{background:var(--success-s);color:var(--success);border-color:var(--success-s)}
.wf-step.current{color:var(--primary)}.wf-step.current .wf-dot{background:var(--primary);color:#fff;border-color:var(--primary)}
a.wf-step:hover{color:var(--primary)}a.wf-step:hover .wf-dot{border-color:var(--primary)}
.wf-sep{flex:1;min-width:14px;height:2px;background:var(--border);margin:0 8px}
.wf-sep.done{background:var(--success)}
.nav-num{display:inline-grid;place-items:center;width:19px;height:19px;border-radius:5px;background:var(--surface-2);color:var(--muted);font-size:10.5px;font-weight:700;flex:none}
.nav-item.active .nav-num{background:var(--primary);color:#fff}
.nav-sub{padding-left:38px !important;font-size:12.5px}
.nav-sub::after{content:"";position:absolute;left:22px;top:50%;width:8px;height:1px;background:var(--border)}
.nav-sub{position:relative}
/* ---- end workflow spine v2 ---- */
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">S</div>
      <h1>Candidate Database has moved</h1>
      <p>The talent-pool filters and card view are now part of the Shortlist screen.<br>It now lives inside <b>Shortlist (Stage 5)</b>. Redirecting&hellip;</p>
      <a class="btn" href="results.page.html" data-testid="moved-continue">Continue to Shortlist (Stage 5)</a>
    </div>
  </div>
  <script>location.replace('results.page.html');</script>
</body>
</html>
